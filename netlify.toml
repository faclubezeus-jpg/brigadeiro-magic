[build]
  command = "pnpm -w run deploy"
  publish = "artifacts/api-server/client"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
