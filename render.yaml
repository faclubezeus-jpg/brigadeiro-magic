services:
  - type: web
    name: brigadeiro-magic
    env: node
    plan: starter
    buildCommand: pnpm install && pnpm run deploy
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
