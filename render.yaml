services:
  - type: web
    name: brigadeiro-magic
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run deploy && pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /var/lib/data/sqlite.db
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /var/lib/data
      sizeGB: 1
