kind = "web"
previewPath = "/"
title = "Docinho & Cia — Confeitaria Premium"
version = "1.0.0"
id = "artifacts/doce-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23815

[services.development]
run = "pnpm --filter @workspace/doce-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/doce-site", "run", "build" ]
publicDir = "artifacts/doce-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23815"
BASE_PATH = "/"
